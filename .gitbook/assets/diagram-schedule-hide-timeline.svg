<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cs3" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#202223" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="820" height="260" rx="14" fill="#ffffff" stroke="#e1e3e5" filter="url(#cs3)"/>
  <text x="48" y="58" font-size="18" font-weight="700" fill="#202223">Schedule hide — the “Christmas Red” variant</text>

  <!-- baseline timeline -->
  <line x1="70" y1="150" x2="790" y2="150" stroke="#c9cccf" stroke-width="2"/>

  <!-- hidden window band -->
  <rect x="300" y="118" width="260" height="64" rx="10" fill="#fbeae5" stroke="#d72c0d" stroke-width="1.5"/>
  <text x="430" y="146" font-size="14" font-weight="700" text-anchor="middle" fill="#b42318">HIDDEN</text>
  <text x="430" y="167" font-size="12" text-anchor="middle" fill="#a3453a">variant off the product page</text>

  <!-- visible bands left & right -->
  <text x="185" y="146" font-size="13" font-weight="700" text-anchor="middle" fill="#008060">Visible</text>
  <text x="185" y="166" font-size="11" text-anchor="middle" fill="#4a6b60">shows normally</text>
  <text x="675" y="146" font-size="13" font-weight="700" text-anchor="middle" fill="#008060">Visible again</text>
  <text x="675" y="166" font-size="11" text-anchor="middle" fill="#4a6b60">auto-restored</text>

  <!-- From marker -->
  <line x1="300" y1="104" x2="300" y2="200" stroke="#202223" stroke-width="1.4" stroke-dasharray="4 4"/>
  <circle cx="300" cy="150" r="6" fill="#d72c0d"/>
  <text x="300" y="94" font-size="13" font-weight="700" text-anchor="middle" fill="#202223">From</text>
  <text x="300" y="222" font-size="12" text-anchor="middle" fill="#6d7175">Nov 1, 00:00</text>

  <!-- To marker -->
  <line x1="560" y1="104" x2="560" y2="200" stroke="#202223" stroke-width="1.4" stroke-dasharray="4 4"/>
  <circle cx="560" cy="150" r="6" fill="#008060"/>
  <text x="560" y="94" font-size="13" font-weight="700" text-anchor="middle" fill="#202223">To</text>
  <text x="560" y="222" font-size="12" text-anchor="middle" fill="#6d7175">Dec 31, 23:59</text>

  <!-- footnote -->
  <text x="48" y="262" font-size="12.5" fill="#6d7175">No manual flip: Camouflage hides the variant at “From” and restores it at “To”, on your store’s clock.</text>
</svg>
