<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#202223" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- ===== LEFT: Before ===== -->
  <rect x="30" y="30" width="370" height="300" rx="14" fill="#ffffff" stroke="#e1e3e5" filter="url(#cardShadow)"/>
  <text x="58" y="72" font-size="13" font-weight="700" letter-spacing="1.5" fill="#6d7175">WITHOUT CAMOUFLAGE</text>
  <text x="58" y="112" font-size="18" font-weight="700" fill="#202223">Choose your size</text>

  <!-- pills: S M L XL(sold out) -->
  <g font-size="16" font-weight="600" text-anchor="middle">
    <rect x="58"  y="140" width="66" height="42" rx="9" fill="#ffffff" stroke="#c9cccf" stroke-width="1.5"/>
    <text x="91"  y="167" fill="#202223">S</text>
    <rect x="138" y="140" width="66" height="42" rx="9" fill="#ffffff" stroke="#c9cccf" stroke-width="1.5"/>
    <text x="171" y="167" fill="#202223">M</text>
    <rect x="218" y="140" width="66" height="42" rx="9" fill="#ffffff" stroke="#c9cccf" stroke-width="1.5"/>
    <text x="251" y="167" fill="#202223">L</text>
    <!-- XL: sold out but still shown & clickable -->
    <rect x="298" y="140" width="66" height="42" rx="9" fill="#fbeae5" stroke="#d72c0d" stroke-width="1.5"/>
    <text x="331" y="167" fill="#d72c0d">XL</text>
    <line x1="306" y1="161" x2="356" y2="161" stroke="#d72c0d" stroke-width="1.6"/>
  </g>
  <text x="331" y="200" font-size="11" font-weight="600" text-anchor="middle" fill="#d72c0d">0 in stock</text>

  <!-- frustrated outcome -->
  <rect x="58" y="232" width="306" height="66" rx="10" fill="#fbeae5"/>
  <text x="78" y="262" font-size="14" font-weight="700" fill="#b42318">✕  Dead end</text>
  <text x="78" y="284" font-size="13" fill="#8a3a30">Shopper picks XL, then can't buy it.</text>

  <!-- ===== ARROW ===== -->
  <g>
    <line x1="404" y1="180" x2="452" y2="180" stroke="#008060" stroke-width="3"/>
    <path d="M452 180 l-12 -7 v14 z" fill="#008060"/>
  </g>

  <!-- ===== RIGHT: After ===== -->
  <rect x="460" y="30" width="370" height="300" rx="14" fill="#ffffff" stroke="#008060" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="488" y="72" font-size="13" font-weight="700" letter-spacing="1.5" fill="#008060">WITH CAMOUFLAGE</text>
  <text x="488" y="112" font-size="18" font-weight="700" fill="#202223">Choose your size</text>

  <g font-size="16" font-weight="600" text-anchor="middle">
    <rect x="488" y="140" width="66" height="42" rx="9" fill="#ffffff" stroke="#c9cccf" stroke-width="1.5"/>
    <text x="521" y="167" fill="#202223">S</text>
    <rect x="568" y="140" width="66" height="42" rx="9" fill="#ffffff" stroke="#c9cccf" stroke-width="1.5"/>
    <text x="601" y="167" fill="#202223">M</text>
    <rect x="648" y="140" width="66" height="42" rx="9" fill="#ffffff" stroke="#c9cccf" stroke-width="1.5"/>
    <text x="681" y="167" fill="#202223">L</text>
    <!-- XL slot: hidden (ghost) -->
    <rect x="728" y="140" width="66" height="42" rx="9" fill="none" stroke="#c9cccf" stroke-width="1.4" stroke-dasharray="5 5"/>
    <text x="761" y="166" font-size="11" font-weight="600" fill="#b5b9bd">hidden</text>
  </g>

  <rect x="488" y="232" width="306" height="66" rx="10" fill="#e3f1ec"/>
  <text x="508" y="262" font-size="14" font-weight="700" fill="#008060">✓  Only buyable options shown</text>
  <text x="508" y="284" font-size="13" fill="#4a6b60">Every size a shopper can pick is in stock.</text>
</svg>
