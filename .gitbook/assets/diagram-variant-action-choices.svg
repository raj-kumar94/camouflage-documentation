<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 486" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cs4" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#202223" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="820" height="446" rx="14" fill="#ffffff" stroke="#e1e3e5" filter="url(#cs4)"/>
  <text x="48" y="58" font-size="18" font-weight="700" fill="#202223">The same sold-out “XL”, shown 5 ways</text>
  <text x="48" y="80" font-size="13" fill="#6d7175">Pick the action on the Setup page. S · M · L are in stock; XL is sold out.</text>

  <!-- shared: draw S M L pills helper positions 340,412,484 ; XL at 556 -->
  <!-- Row 1: Hide -->
  <text x="48" y="132" font-size="14" font-weight="700" fill="#202223">Hide</text>
  <text x="48" y="152" font-size="12" fill="#6d7175">XL disappears</text>
  <g font-size="15" font-weight="600" text-anchor="middle">
    <rect x="340" y="118" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="371" y="144" fill="#202223">S</text>
    <rect x="412" y="118" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="443" y="144" fill="#202223">M</text>
    <rect x="484" y="118" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="515" y="144" fill="#202223">L</text>
    <rect x="556" y="118" width="62" height="40" rx="9" fill="none" stroke="#c9cccf" stroke-width="1.3" stroke-dasharray="5 5"/><text x="587" y="143" font-size="10" fill="#b5b9bd">hidden</text>
  </g>

  <line x1="48" y1="176" x2="812" y2="176" stroke="#f1f2f3" stroke-width="1"/>

  <!-- Row 2: Disable -->
  <text x="48" y="204" font-size="14" font-weight="700" fill="#202223">Disable</text>
  <text x="48" y="224" font-size="12" fill="#6d7175">visible, un-clickable</text>
  <g font-size="15" font-weight="600" text-anchor="middle">
    <rect x="340" y="190" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="371" y="216" fill="#202223">S</text>
    <rect x="412" y="190" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="443" y="216" fill="#202223">M</text>
    <rect x="484" y="190" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="515" y="216" fill="#202223">L</text>
    <rect x="556" y="190" width="62" height="40" rx="9" fill="#f6f6f7" stroke="#e1e3e5" stroke-width="1.4"/><text x="587" y="216" fill="#b5b9bd">XL</text>
  </g>

  <line x1="48" y1="248" x2="812" y2="248" stroke="#f1f2f3" stroke-width="1"/>

  <!-- Row 3: Strike-through -->
  <text x="48" y="276" font-size="14" font-weight="700" fill="#202223">Strike-through</text>
  <text x="48" y="296" font-size="12" fill="#6d7175">“coming back” signal</text>
  <g font-size="15" font-weight="600" text-anchor="middle">
    <rect x="340" y="262" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="371" y="288" fill="#202223">S</text>
    <rect x="412" y="262" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="443" y="288" fill="#202223">M</text>
    <rect x="484" y="262" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="515" y="288" fill="#202223">L</text>
    <rect x="556" y="262" width="62" height="40" rx="9" fill="#f6f6f7" stroke="#e1e3e5" stroke-width="1.4"/><text x="587" y="288" fill="#8a8a8a">XL</text>
    <line x1="562" y1="282" x2="612" y2="282" stroke="#8a8a8a" stroke-width="1.6"/>
  </g>

  <line x1="48" y1="320" x2="812" y2="320" stroke="#f1f2f3" stroke-width="1"/>

  <!-- Row 4: Append text -->
  <text x="48" y="348" font-size="14" font-weight="700" fill="#202223">Append text</text>
  <text x="48" y="368" font-size="12" fill="#6d7175">best for dropdowns</text>
  <g font-size="14" text-anchor="middle">
    <rect x="340" y="334" width="278" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/>
    <text x="360" y="359" text-anchor="start" font-weight="600" fill="#202223">XL — sold out</text>
    <path d="M596 351 l8 0 l-4 6 z" fill="#6d7175"/>
  </g>

  <line x1="48" y1="392" x2="812" y2="392" stroke="#f1f2f3" stroke-width="1"/>

  <!-- Row 5: None -->
  <text x="48" y="420" font-size="14" font-weight="700" fill="#202223">None</text>
  <text x="48" y="440" font-size="12" fill="#6d7175">picker left untouched</text>
  <g font-size="15" font-weight="600" text-anchor="middle">
    <rect x="340" y="406" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="371" y="432" fill="#202223">S</text>
    <rect x="412" y="406" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="443" y="432" fill="#202223">M</text>
    <rect x="484" y="406" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="515" y="432" fill="#202223">L</text>
    <rect x="556" y="406" width="62" height="40" rx="9" fill="#fff" stroke="#c9cccf" stroke-width="1.4"/><text x="587" y="432" fill="#202223">XL</text>
  </g>
</svg>
