<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cs2" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#202223" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="820" height="390" rx="14" fill="#ffffff" stroke="#e1e3e5" filter="url(#cs2)"/>
  <text x="48" y="60" font-size="18" font-weight="700" fill="#202223">A t-shirt in Color × Size — what exists vs. what the picker shows</text>

  <!-- ===== matrix ===== -->
  <!-- column headers -->
  <text x="300" y="110" font-size="14" font-weight="700" text-anchor="middle" fill="#6d7175">Size S</text>
  <text x="470" y="110" font-size="14" font-weight="700" text-anchor="middle" fill="#6d7175">Size M</text>

  <!-- row: Red -->
  <text x="150" y="152" font-size="14" font-weight="700" text-anchor="end" fill="#202223">Red</text>
  <!-- Red/S in stock -->
  <rect x="220" y="126" width="160" height="52" rx="9" fill="#e3f1ec" stroke="#008060" stroke-width="1.5"/>
  <text x="300" y="150" font-size="13" font-weight="700" text-anchor="middle" fill="#008060">In stock</text>
  <text x="300" y="168" font-size="11" text-anchor="middle" fill="#4a6b60">exists · buyable</text>
  <!-- Red/M sold out -->
  <rect x="390" y="126" width="160" height="52" rx="9" fill="#fbeae5" stroke="#d72c0d" stroke-width="1.5"/>
  <text x="470" y="150" font-size="13" font-weight="700" text-anchor="middle" fill="#d72c0d">Sold out</text>
  <text x="470" y="168" font-size="11" text-anchor="middle" fill="#a3453a">exists · 0 in stock</text>

  <!-- row: Blue -->
  <text x="150" y="220" font-size="14" font-weight="700" text-anchor="end" fill="#202223">Blue</text>
  <!-- Blue/S in stock -->
  <rect x="220" y="194" width="160" height="52" rx="9" fill="#e3f1ec" stroke="#008060" stroke-width="1.5"/>
  <text x="300" y="218" font-size="13" font-weight="700" text-anchor="middle" fill="#008060">In stock</text>
  <text x="300" y="236" font-size="11" text-anchor="middle" fill="#4a6b60">exists · buyable</text>
  <!-- Blue/M unavailable -->
  <rect x="390" y="194" width="160" height="52" rx="9" fill="#f6f6f7" stroke="#b5b9bd" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="470" y="218" font-size="13" font-weight="700" text-anchor="middle" fill="#6d7175">Unavailable</text>
  <text x="470" y="236" font-size="11" text-anchor="middle" fill="#8a8a8a">never created</text>

  <!-- ===== the distinction callouts ===== -->
  <!-- sold out -->
  <rect x="580" y="126" width="240" height="120" rx="10" fill="#fbeae5"/>
  <circle cx="606" cy="154" r="7" fill="#d72c0d"/>
  <text x="624" y="159" font-size="14" font-weight="700" fill="#b42318">Sold out</text>
  <text x="600" y="186" font-size="12.5" fill="#8a3a30">The variant is real — you made</text>
  <text x="600" y="205" font-size="12.5" fill="#8a3a30">it in Shopify — but has 0 stock.</text>
  <text x="600" y="228" font-size="12.5" fill="#8a3a30">Usually returns on restock.</text>

  <!-- unavailable -->
  <rect x="580" y="256" width="240" height="120" rx="10" fill="#f6f6f7"/>
  <circle cx="606" cy="284" r="7" fill="#8a8a8a"/>
  <text x="624" y="289" font-size="14" font-weight="700" fill="#4a4a4a">Unavailable</text>
  <text x="600" y="316" font-size="12.5" fill="#5c5c5c">A combo the picker offers but</text>
  <text x="600" y="335" font-size="12.5" fill="#5c5c5c">that you never created. Only on</text>
  <text x="600" y="358" font-size="12.5" fill="#5c5c5c">multi-option products.</text>

  <!-- bottom note -->
  <text x="48" y="300" font-size="13" font-weight="700" fill="#202223">Both look identical to a shopper — a clickable option that leads nowhere.</text>
  <text x="48" y="324" font-size="13" fill="#6d7175">Camouflage lets you treat them separately: e.g. strike through</text>
  <text x="48" y="346" font-size="13" fill="#6d7175">sold-out variants (they're coming back) but fully hide unavailable ones</text>
  <text x="48" y="368" font-size="13" fill="#6d7175">(they never existed).</text>
</svg>
