<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#202223" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#008060"/>
    </marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#d72c0d"/>
    </marker>
  </defs>

  <!-- ===== LEFT: the variant ===== -->
  <rect x="30" y="120" width="270" height="160" rx="14" fill="#ffffff" stroke="#e1e3e5" filter="url(#cardShadow)"/>
  <text x="58" y="158" font-size="13" font-weight="700" letter-spacing="1.5" fill="#6d7175">ONE VARIANT</text>
  <text x="58" y="196" font-size="19" font-weight="700" fill="#202223">Perfume — 10ml</text>
  <text x="58" y="222" font-size="14" fill="#6d7175">SKU PRF-10ML · in stock</text>
  <rect x="58" y="240" width="132" height="26" rx="13" fill="#f1f8f5" stroke="#008060"/>
  <text x="124" y="258" font-size="13" font-weight="600" fill="#008060" text-anchor="middle">nothing deleted</text>

  <!-- ===== RIGHT: destinations ===== -->
  <text x="470" y="52" font-size="13" font-weight="700" letter-spacing="1.5" fill="#6d7175">WHERE SHOPPERS SEE IT</text>

  <!-- Online Store : visible -->
  <rect x="470" y="70" width="360" height="60" rx="12" fill="#ffffff" stroke="#e1e3e5" filter="url(#cardShadow)"/>
  <text x="494" y="96" font-size="16" font-weight="700" fill="#202223">Online Store</text>
  <text x="494" y="117" font-size="13" fill="#6d7175">sales channel</text>
  <rect x="726" y="86" width="84" height="28" rx="14" fill="#f1f8f5" stroke="#008060"/>
  <text x="768" y="105" font-size="13" font-weight="700" fill="#008060" text-anchor="middle">visible</text>
  <path d="M300 165 C 380 150, 410 115, 466 100" fill="none" stroke="#008060" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- United States market : visible -->
  <rect x="470" y="146" width="360" height="60" rx="12" fill="#ffffff" stroke="#e1e3e5" filter="url(#cardShadow)"/>
  <text x="494" y="172" font-size="16" font-weight="700" fill="#202223">United States</text>
  <text x="494" y="193" font-size="13" fill="#6d7175">market</text>
  <rect x="726" y="162" width="84" height="28" rx="14" fill="#f1f8f5" stroke="#008060"/>
  <text x="768" y="181" font-size="13" font-weight="700" fill="#008060" text-anchor="middle">visible</text>
  <path d="M300 185 C 370 182, 400 178, 466 176" fill="none" stroke="#008060" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- European Union market : unpublished -->
  <rect x="470" y="222" width="360" height="60" rx="12" fill="#ffffff" stroke="#d72c0d" stroke-dasharray="6 5" filter="url(#cardShadow)"/>
  <text x="494" y="248" font-size="16" font-weight="700" fill="#202223">European Union</text>
  <text x="494" y="269" font-size="13" fill="#6d7175">market</text>
  <rect x="694" y="238" width="116" height="28" rx="14" fill="#fbeae5" stroke="#d72c0d"/>
  <text x="752" y="257" font-size="13" font-weight="700" fill="#d72c0d" text-anchor="middle">unpublished</text>
  <path d="M300 215 C 370 220, 400 240, 466 250" fill="none" stroke="#d72c0d" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrowRed)"/>

  <!-- Wholesale B2B catalog : unpublished -->
  <rect x="470" y="298" width="360" height="60" rx="12" fill="#ffffff" stroke="#d72c0d" stroke-dasharray="6 5" filter="url(#cardShadow)"/>
  <text x="494" y="324" font-size="16" font-weight="700" fill="#202223">Wholesale</text>
  <text x="494" y="345" font-size="13" fill="#6d7175">B2B catalog</text>
  <rect x="694" y="314" width="116" height="28" rx="14" fill="#fbeae5" stroke="#d72c0d"/>
  <text x="752" y="333" font-size="13" font-weight="700" fill="#d72c0d" text-anchor="middle">unpublished</text>
  <path d="M300 235 C 380 250, 400 300, 466 322" fill="none" stroke="#d72c0d" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrowRed)"/>

  <!-- footnote -->
  <text x="30" y="330" font-size="13" fill="#6d7175">Hidden there = gone from search,</text>
  <text x="30" y="350" font-size="13" fill="#6d7175">collections and product pages in</text>
  <text x="30" y="370" font-size="13" fill="#6d7175">that market or catalog only.</text>
</svg>
